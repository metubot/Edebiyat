  .mini-card {
    background: #f0e8da;

  .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
  .btn-gold {

    border: none; border-radius: 12px;
    padding: 13px 28px; color: #fffdf9;
    font-size: 1rem; cursor: pointer;
    font-family: Georgia, serif; font-weight: bold;
    letter-spacing: 0.04em;

  }

  .dot:nth-child(3) { animation-delay: 0.44s; }

  hr { border: none; border-top: 1px solid #d9c9b0; margin: 20px 0; }
  p { line-height: 1.75; }

      eserler: { roman:["Huzur","Saatleri Ayarlama Enstitüsü","Sahnenin Dışındakiler","Mahur Beste","Aydaki Kadın"], şiir:["Şiirler"], deneme:["Beş Şehir","Yaşadığım Gibi"], hikaye:["Yaz Yağmuru","Abdullah Efendinin Rüyaları"] }

    "Yusuf Ziya Ortaç": { ozellikler:["Beş Hececilerden"], eserler:{ şiir:["Akından Akına","Cenk Ufukları"] } },
    "Halit Fahri Ozansoy": { ozellikler:["Beş Hececilerden"], eserler:{ şiir:["Sulara Dalan Gözler","Efsaneler"] } },
    "Enis Behiç Koryürek": { ozellikler:["Beş Hececilerden","Milli duygular işledi"], eserler:{ şiir:["Miras","Güneşin Ölümü"] } }

function tumYazarlar() {
  const liste = [];
  for (const d of Object.values(KAYNAK)) {
    if (!d.yazarlar) continue;
    for (const [yazar, bilgi] of Object.entries(d.yazarlar)) {
      liste.push({ yazar, bilgi, donem: d.donem });
    }
  }
  return liste;
}
const YAZARLAR = tumYazarlar();

function rastgele(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const SISTEM = `Sen AYT Edebiyat sınav sorusu üreten bir uzmansın. Sana verilen yazar/dönem bilgisinden gerçek AYT formatında ZOR ve ALDATICI tek soru üreteceksin.

Soru tipleri (çeşitli tiplerden üret):
1. Yazar özellikleri/ipuçları verilir → Bu yazarın hangi eseri aşağıdakilerden hangisidir?
2. Eser adları verilir → Bunların yazarı kimdir?
3. Bir yazarın özellikleri verilir → Aşağıdakilerden hangisi YANLIŞTIR?
4. Dönem/akım özellikleri → Bu dönemde hangi yazar yer almaz?
5. Lakap/takma ad → Bu kim?
6. İlk olan eser/olay → Kim yazmıştır?
7. Yazarın bir eseri bağlamında bilgi testi

ALDATICI ŞIKLAR KURALI: Yanlış şıklar mutlaka aynı dönemden veya benzer akımdan başka yazarların gerçek eserleri olsun.

Yanıtı SADECE aşağıdaki JSON formatında ver, başka hiçbir şey yazma:
{"soru":"...","tip":"...","A":"...","B":"...","C":"...","D":"...","E":"...","cevap":"A","aciklamalar":{"A":"...","B":"...","C":"...","D":"...","E":"..."},"ozet":"..."}`;

async function soruUret() {
  const ana = rastgele(YAZARLAR);
  const d1 = rastgele(YAZARLAR);
  const d2 = rastgele(YAZARLAR);
  const d3 = rastgele(YAZARLAR);
  const icerik = `ANA YAZAR: ${ana.yazar}\nDÖNEM: ${ana.donem}\nÖZELLİKLER: ${ana.bilgi.ozellikler?.join(" | ")}\nESERLERİ: ${JSON.stringify(ana.bilgi.eserler)}\nİLKLERİ: ${JSON.stringify(ana.bilgi.ilkleri||[])}\n\nALDATICI ŞIK MALZEMELERİ:\n- ${d1.yazar} (${d1.donem}) eserleri: ${Object.values(d1.bilgi.eserler||{}).flat().slice(0,5).join(", ")}\n- ${d2.yazar} (${d2.donem}) eserleri: ${Object.values(d2.bilgi.eserler||{}).flat().slice(0,5).join(", ")}\n- ${d3.yazar} (${d3.donem}) eserleri: ${Object.values(d3.bilgi.eserler||{}).flat().slice(0,5).join(", ")}\n\nZorlu, aldatıcı AYT sorusu üret.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1024,
      messages: [{ role: "user", content: SISTEM + "\n\n" + icerik }]
    })
  });
  if (!res.ok) throw new Error("API " + res.status + ": " + (await res.text()).slice(0,200));
  const data = await res.json();
  const raw = data.content?.[0]?.text || "";
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("JSON bulunamadı");
  return JSON.parse(match[0]);
}

// ========== STATE ==========
let state = {
  ekran: "ana", sorular: [], mevcut: 0,
  secilen: null, cevaplandi: false,
  puan: 0, yanlis: 0, gecmis: [],
  kombo: 0, maxKombo: 0, toplamHedef: 20,
  yukl: false, soruYukl: false, hata: "",
  arkaplan: [], arkaplanYukl: false
};

function setState(partial) {
  state = { ...state, ...partial };
  render();
}

async function arkaplanDoldur() {
  if (state.arkaplanYukl || state.arkaplan.length >= 4) return;
  setState({ arkaplanYukl: true });
  try {
    const s = await soruUret();
    state.arkaplan.push(s);
  } catch(e) {}
  setState({ arkaplanYukl: false });
}

async function quizBaslat(adet) {
  setState({ ekran:"yukl", hata:"", puan:0, yanlis:0, mevcut:0, gecmis:[], kombo:0, maxKombo:0, toplamHedef:adet, sorular:[], arkaplan:[], yukl:true });
  try {
    const ilkler = await Promise.all([soruUret(), soruUret(), soruUret()]);
    setState({ sorular: ilkler.slice(0, Math.min(3,adet)), ekran:"quiz", secilen:null, cevaplandi:false, yukl:false });
    setTimeout(() => arkaplanDoldur(), 600);
  } catch(e) {
    setState({ hata:"Hata: " + e.message + " — Lütfen tekrar deneyin.", ekran:"ana", yukl:false });
  }
}

async function sonraki() {
  const yeniIdx = state.mevcut + 1;
  if (yeniIdx >= state.toplamHedef) { setState({ ekran:"sonuc" }); return; }
  if (state.arkaplan.length > 0) {
    const s = state.arkaplan.shift();
    const sorular = [...state.sorular]; sorular[yeniIdx] = s;
    setState({ sorular, mevcut:yeniIdx, secilen:null, cevaplandi:false });
    setTimeout(() => arkaplanDoldur(), 200);
  } else {
    setState({ soruYukl: true });
    try {
      const s = await soruUret();
      const sorular = [...state.sorular]; sorular[yeniIdx] = s;
      setState({ sorular, mevcut:yeniIdx, secilen:null, cevaplandi:false, soruYukl:false });
    } catch(e) { setState({ hata:"Soru yüklenemedi.", soruYukl:false }); }
  }
}

function sikSec(sik) {
  if (state.cevaplandi) return;
  const soruObj = state.sorular[state.mevcut];
  const dogru = soruObj?.cevap === sik;
  const gecmis = [...state.gecmis, { soru: soruObj?.soru, secilen: sik, dogru: soruObj?.cevap, dogruMu: dogru }];
  let { puan, yanlis, kombo, maxKombo } = state;
  if (dogru) { puan++; kombo++; if (kombo > maxKombo) maxKombo = kombo; }
  else { yanlis++; kombo = 0; }
  setState({ secilen:sik, cevaplandi:true, puan, yanlis, kombo, maxKombo, gecmis });
}

// ========== RENDER ==========
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'className') e.className = v;
    else if (k === 'onClick') e.addEventListener('click', v);
    else if (k === 'disabled') e.disabled = v;
    else if (k === 'style') Object.assign(e.style, v);
    else if (k === 'innerHTML') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  root.className = 'app';

  const { ekran, sorular, mevcut, secilen, cevaplandi, puan, yanlis, gecmis, kombo, maxKombo, toplamHedef, soruYukl, hata, arkaplan } = state;

  // --- ANA ---
  if (ekran === 'ana') {
    const wrap = el('div', {className:'wrap center'});
    wrap.appendChild(el('div', {style:{fontSize:'3rem',marginBottom:'10px'}}, '📜'));
    wrap.appendChild(el('h1', {}, 'AYT Edebiyat'));
    wrap.appendChild(el('p', {className:'subtitle'}, 'Yapay Zeka Destekli Sınav Hazırlık'));
    if (hata) wrap.appendChild(el('div', {className:'hata-box'}, '⚠️ ' + hata));

    const kart = el('div', {className:'card'});
    kart.appendChild(el('h2', {style:{color:'#3d2b1f',marginBottom:'10px',fontSize:'1.3rem'}}, 'Nasıl Çalışır?'));
    kart.appendChild(el('p', {style:{color:'#8b6444',marginBottom:'20px',fontSize:'0.97rem'}},
      'Rüştü Hoca\'nın AYT Edebiyat notlarındaki tüm yazarlar, dönemler ve eserler üzerine yapay zeka her seferinde farklı ve gerçek AYT formatında sorular üretir. Yanlış her şık ayrı ayrı açıklanır.'));

    const grid = el('div', {className:'grid2'});
    [['🖋','Tanzimat 1. ve 2. Dönem'],['📖','Servetifünun Edebiyatı'],['🌿','Millî Edebiyat Dönemi'],['🏛','Cumhuriyet Edebiyatı']].forEach(([i,k]) => {
      grid.appendChild(el('div', {className:'mini-card'}, el('span',{style:{fontSize:'1.2rem'}},i), k));
    });
    kart.appendChild(grid);
    kart.appendChild(el('hr', {}));
    kart.appendChild(el('p', {style:{color:'#8b6444',marginBottom:'14px',textAlign:'center'}}, 'Kaç soru çözmek istiyorsun?'));
    const btnG = el('div', {className:'btn-group'});
    [10,20,30,50].forEach(n => {
      btnG.appendChild(el('button', {className:'btn-gold', onClick:()=>quizBaslat(n)}, n+' Soru'));
    });
    kart.appendChild(btnG);
    wrap.appendChild(kart);
    root.appendChild(wrap);
    return;
  }

  // --- YÜKLEME ---
  if (ekran === 'yukl') {
    const w = el('div', {className:'yukl-wrap'});
    w.appendChild(el('div', {className:'spinner'}, '⚗️'));
    w.appendChild(el('p', {style:{color:'#8b6914',fontWeight:'bold',fontSize:'1.1rem'}}, 'Sorular hazırlanıyor…'));
    w.appendChild(el('p', {style:{color:'#8b6444',fontSize:'0.9rem'}}, 'Yapay zeka AYT soruları üretiyor'));
    const dots = el('div', {className:'dots'});
    [0,1,2].forEach(i => { const d = el('div',{className:'dot'}); d.style.animationDelay=i*0.22+'s'; dots.appendChild(d); });
    w.appendChild(dots);
    root.appendChild(w);
    return;
  }

  // --- QUIZ ---
  if (ekran === 'quiz') {
    if (soruYukl || !sorular[mevcut]) {
      const w = el('div',{className:'yukl-wrap'});
      w.appendChild(el('p',{style:{color:'#8b6914'}},'Soru yükleniyor…'));
      root.appendChild(w); return;
    }
    const soruObj = sorular[mevcut];
    const yuzde = Math.round((mevcut/toplamHedef)*100);
    const wrap = el('div',{className:'wrap'});

    // Üst bar
    const topbar = el('div',{className:'topbar'});
    topbar.appendChild(el('span',{style:{color:'#3d2b1f',fontWeight:'bold'}}, (mevcut+1)+' / '+toplamHedef));
    const sR = el('div',{className:'score-right'});
    if (kombo >= 2) sR.appendChild(el('span',{className:'kombo-badge'}, '🔥 '+kombo+' kombo'));
    sR.appendChild(el('span',{className:'dogru-s'}, '✓ '+puan));
    sR.appendChild(el('span',{className:'yanlis-s'}, '✗ '+yanlis));
    topbar.appendChild(sR);
    wrap.appendChild(topbar);

    // Progress
    const pw = el('div',{className:'progress-wrap'});
    const pb = el('div',{className:'progress-bar'});
    pb.style.width = yuzde+'%';
    pw.appendChild(pb); wrap.appendChild(pw);

    // Kart
    const kart = el('div',{className:'card'});
    kart.appendChild(el('div',{className:'badge'}, (soruObj.tip||'SORU').toUpperCase().replace(/_/g,' ')));
    kart.appendChild(el('p',{className:'soru-text'}, soruObj.soru));

    const sikDiv = el('div',{className:'siklar'});
    ['A','B','C','D','E'].forEach(sik => {
      const secildi = secilen === sik;
      const dogruMu = cevaplandi ? (sik === soruObj.cevap ? true : secildi ? false : null) : null;

      const btn = el('button', {
        className: 'sik-btn' + (dogruMu===true?' dogru':dogruMu===false?' yanlis':''),
        disabled: cevaplandi,
        onClick: () => sikSec(sik)
      });
      const circle = el('span', {className:'sik-circle'+(dogruMu===true?' dogru':dogruMu===false?' yanlis':'')}, sik);
      btn.appendChild(circle);
      btn.appendChild(el('span',{},soruObj[sik]||''));
      if (cevaplandi && sik === soruObj.cevap) btn.appendChild(el('span',{style:{marginLeft:'auto',color:'#4a7c59',flexShrink:'0'}},'✓'));
      if (cevaplandi && secildi && sik !== soruObj.cevap) btn.appendChild(el('span',{style:{marginLeft:'auto',color:'#9b4444',flexShrink:'0'}},'✗'));
      sikDiv.appendChild(btn);

      if (cevaplandi && soruObj.aciklamalar?.[sik]) {
        sikDiv.appendChild(el('div',{className:'aciklama'+(sik===soruObj.cevap?' dogru':'')}, soruObj.aciklamalar[sik]));
      }
    });
    kart.appendChild(sikDiv);

    if (cevaplandi && soruObj.ozet) {
      kart.appendChild(el('div',{className:'ozet-box'}, el('strong',{style:{color:'#8b6914'}},'📖 '), soruObj.ozet));
    }
    if (cevaplandi) {
      const sw = el('div',{className:'sonraki-wrap'});
      sw.appendChild(el('button',{className:'btn-gold',onClick:sonraki}, mevcut+1>=toplamHedef?'Sonuçları Gör →':'Sonraki Soru →'));
      kart.appendChild(sw);
    }
    wrap.appendChild(kart);
    root.appendChild(wrap);
    return;
  }

  // --- SONUÇ ---
  if (ekran === 'sonuc') {
    const yuzd = Math.round((puan/toplamHedef)*100);
    const [emoji, mesaj] = yuzd>=90?['🏆','Mükemmel! AYT\'ye hazırsın.']:yuzd>=75?['🌟','Harika gidiyorsun!']:yuzd>=55?['📚','İyi, ama eksiklerin var.']:['💪','Biraz daha çalışmak gerek.'];
    const wrap = el('div',{className:'wrap center'});
    wrap.appendChild(el('div',{style:{fontSize:'3rem',marginBottom:'10px'}},emoji));
    wrap.appendChild(el('h1',{style:{marginBottom:'6px'}},'Sınav Bitti!'));
    wrap.appendChild(el('p',{style:{color:'#8b6914',fontSize:'1.1rem',marginBottom:'28px'}},mesaj));
    const kart = el('div',{className:'card'});
    const grid = el('div',{className:'grid3'});
    [['Doğru',puan,'#4a7c59'],['Yanlış',yanlis,'#9b4444'],['Başarı','%'+yuzd,'#8b6914']].forEach(([l,d,r])=>{
      const sc = el('div',{className:'sonuc-skor'});
      sc.appendChild(el('div',{className:'skor-sayi',style:{color:r}},String(d)));
      sc.appendChild(el('div',{className:'skor-label'},l));
      grid.appendChild(sc);
    });
    kart.appendChild(grid);
    if (maxKombo >= 3) kart.appendChild(el('div',{className:'kombo-info'},'🔥 En uzun kombon: ',el('strong',{},String(maxKombo)),' ardışık doğru!'));
    const gl = el('div',{className:'gecmis-list'});
    gecmis.forEach(c => {
      const item = el('div',{className:'gecmis-item '+(c.dogruMu?'d':'y')});
      item.appendChild(el('span',{style:{color:c.dogruMu?'#4a7c59':'#9b4444',flexShrink:'0'}},c.dogruMu?'✓':'✗'));
      const info = el('div',{});
      info.appendChild(el('div',{style:{color:'#5c3d1e'}},(c.soru||'').substring(0,85)+'…'));
      if (!c.dogruMu) { const d=el('div',{style:{color:'#8b6444',marginTop:'2px'}},'Doğru: '); d.appendChild(el('strong',{style:{color:'#4a7c59'}},c.dogru)); info.appendChild(d); }
      item.appendChild(info);
      gl.appendChild(item);
    });
    kart.appendChild(gl);
    const bg = el('div',{className:'btn-group'});
    bg.appendChild(el('button',{className:'btn-gold',onClick:()=>quizBaslat(toplamHedef)},'🔄 Tekrar Dene'));
    bg.appendChild(el('button',{className:'btn-outline',onClick:()=>setState({ekran:'ana'})},'Ana Menü'));
    kart.appendChild(bg);
    wrap.appendChild(kart);
    root.appendChild(wrap);
    return;
  }
}

render();
</script>
